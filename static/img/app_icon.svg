<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3a67"/>
      <stop offset="1" stop-color="#141c33"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7bd3ff"/>
      <stop offset="1" stop-color="#3aa0e0"/>
    </linearGradient>
    <linearGradient id="left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f7fbf"/>
      <stop offset="1" stop-color="#1c5590"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c5f9a"/>
      <stop offset="1" stop-color="#123f6b"/>
    </linearGradient>
  </defs>

  <!-- fond arrondi -->
  <rect x="0" y="0" width="256" height="256" rx="52" fill="url(#bg)"/>

  <!-- grille de sol (éditeur) -->
  <g stroke="#3d5a8a" stroke-width="1.5" opacity="0.55">
    <path d="M40 168 L128 208 L216 168" fill="none"/>
    <path d="M62 156 L128 188 L194 156" fill="none"/>
    <path d="M84 144 L128 166 L172 144" fill="none"/>
  </g>

  <!-- cube isométrique -->
  <g stroke="#0c1526" stroke-width="3" stroke-linejoin="round">
    <!-- face dessus -->
    <polygon points="128,44 200,84 128,124 56,84" fill="url(#top)"/>
    <!-- face gauche -->
    <polygon points="56,84 128,124 128,206 56,166" fill="url(#left)"/>
    <!-- face droite -->
    <polygon points="200,84 128,124 128,206 200,166" fill="url(#right)"/>
  </g>

  <!-- points de contrôle (vertices) -->
  <g fill="#ffd24a" stroke="#7a5500" stroke-width="2">
    <circle cx="128" cy="44" r="7"/>
    <circle cx="200" cy="84" r="7"/>
    <circle cx="56" cy="84" r="7"/>
    <circle cx="128" cy="206" r="7"/>
  </g>
</svg>
