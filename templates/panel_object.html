<!-- Objects -->

<div class="panel_objects  input_interface" hidden >

  <div class="titlepanel" > Object </div>

  <style>
    /* Icon grid to pick the object to create. Scoped under .panel_objects so it beats the
       generic ".input_interface * { border:none }" rule. */
    .panel_objects .obj-grid {
          display:grid; grid-template-columns:repeat(3, 1fr); gap:9px;
          padding:6px 16px 16px; margin-top:6px;
    }
    .panel_objects .obj-icon {
          display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
          padding:9px 4px; border:1px solid #dcdcdc; border-radius:9px; background:#fff; cursor:pointer;
          font-family:sans-serif; font-size:11px; letter-spacing:normal; color:#555;
          transition:background .12s, border-color .12s, box-shadow .12s;
    }
    .panel_objects .obj-icon svg { width:34px; height:34px; color:#444; }
    .panel_objects .obj-icon:hover { background:#f2f7ff; border-color:#9bbce8; }
    .panel_objects .obj-icon.active {
          background:#e3f0ff; border-color:#4285f4; color:#1a56b0;
          box-shadow:0 0 0 2px rgba(66,133,244,.25);
    }
    .panel_objects .obj-icon.active svg { color:#1a56b0; }
  </style>

  <div id="obj_icon_grid" class="obj-grid">

    <button type="button" class="obj-icon" data-obj="wall" title="Wall — segment de mur vertical">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="8" width="22" height="16" rx="1"/><line x1="5" y1="16" x2="27" y2="16" stroke-width="1.4"/><line x1="16" y1="8" x2="16" y2="16" stroke-width="1.4"/><line x1="10.5" y1="16" x2="10.5" y2="24" stroke-width="1.4"/><line x1="21.5" y1="16" x2="21.5" y2="24" stroke-width="1.4"/></svg>
      <span>wall</span>
    </button>

    <button type="button" class="obj-icon" data-obj="cube" title="Cube — bloc plein">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4 L28 11 L28 22 L16 29 L4 22 L4 11 Z"/><path d="M4 11 L16 18 L28 11 M16 18 L16 29" stroke-width="1.4"/></svg>
      <span>cube</span>
    </button>

    <button type="button" class="obj-icon" data-obj="plane" title="Plane — surface plane">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 23 L14 9 L27 9 L18 23 Z"/></svg>
      <span>plane</span>
    </button>

    <button type="button" class="obj-icon" data-obj="pavement" title="Pavement — sol dallé">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 23 L14 9 L27 9 L18 23 Z"/><line x1="9.5" y1="16" x2="22.5" y2="16" stroke-width="1"/><line x1="12.7" y1="11.7" x2="16.3" y2="20.3" stroke-width="1"/><line x1="18" y1="9" x2="14.5" y2="17.5" stroke-width="1"/></svg>
      <span>pavement</span>
    </button>

    <button type="button" class="obj-icon" data-obj="track" title="Track — route / chemin">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor"><path d="M4 27 C 11 6, 21 26, 28 6" stroke-width="3"/><path d="M4 27 C 11 6, 21 26, 28 6" stroke="#fff" stroke-width="0.9" stroke-dasharray="2.5 2.5"/></svg>
      <span>track</span>
    </button>

    <button type="button" class="obj-icon" data-obj="box" title="Box — contenant ouvert (murs + couvercle optionnel)">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 8 L7 24 L25 24 L25 8"/><path d="M7 24 L11 27 L29 27 L25 24 M25 8 L29 11 L29 27" stroke-width="1.3"/></svg>
      <span>box</span>
    </button>

    <button type="button" class="obj-icon" data-obj="sphere" title="Sphere — une bille">
      <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="10" fill="none" stroke="currentColor" stroke-width="2"/><ellipse cx="12" cy="12" rx="2.6" ry="1.6" fill="currentColor" opacity="0.45" transform="rotate(-40 12 12)"/></svg>
      <span>sphere</span>
    </button>

    <button type="button" class="obj-icon" data-obj="string" title="String — chaîne de ressorts">
      <svg viewBox="0 0 32 32"><circle cx="4" cy="16" r="2.6" fill="currentColor"/><circle cx="28" cy="16" r="2.6" fill="currentColor"/><path d="M7 16 L10 10 L13 22 L16 10 L19 22 L22 10 L25 16" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
      <span>string</span>
    </button>

    <button type="button" class="obj-icon" data-obj="no_tool" title="No tool — arrêter la création">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2"><circle cx="16" cy="16" r="11"/><line x1="8.2" y1="8.2" x2="23.8" y2="23.8"/></svg>
      <span>no tool</span>
    </button>

  </div>

</div>

<script>

{% set objs = ['wall', 'cube', 'plane', 'pavement', 'track',
                'box', 'sphere', 'string', 'no_tool'] %}
dict_obj_param = {}
{% for obj in objs %}
dict_obj_param['{{obj}}'] = 'new_' + '{{obj}}' + '_ok'
{% endfor %}

reinit_params_ok()

// Pick the object to create by clicking its icon (replaces the old <select>).
$('#obj_icon_grid').on('click', '.obj-icon', function(){
      var obj = $(this).attr('data-obj')
      reinit_params_ok()                                   // turn every creation tool off first
      var param = dict_obj_param[obj]
      if (param){ window[param] = true }                   // activate the chosen tool (incl. new_no_tool_ok)
      $('#obj_icon_grid .obj-icon').removeClass('active')
      $(this).addClass('active')
      $('#active_obj_navbar').text(obj === 'no_tool' ? '' : $(this).find('span').text())  // active tool -> navbar
})

</script>
