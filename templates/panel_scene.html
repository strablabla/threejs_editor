    <script>

    function update_scene_name_display(){         // scene name shown in the navbar (to the left of the ?)
         $('#scene_name_navbar').text(scene.name || '')
         if (typeof report_bind_scene === 'function'){ report_bind_scene() }   // switch the report to THIS scene
    }

    function archive_scene(name){                 // saves the current scene as <name> (-> scenes/<name>.json)
         var oldName = scene.name                 // name BEFORE saving (often '': scene still unnamed)
         scene.name = (name || '').trim()
         // The report FOLLOWS the scene when it is named/saved (static/reports/<nom>.json).
         // Copy server-side AFTER flushing the pending keystrokes, otherwise the copy would
         // be made from a stale file (the editor writes with a delay).
         // From an UNNAMED scene -> move; from a named one (Save as = clone) -> copy.
         if (scene.name && scene.name !== oldName){ carry_report_to(oldName || '__unnamed__', scene.name, !oldName) }
         $('#scene_name').val(scene.name)
         update_scene_name_display()              // report_bind_scene then reads the key (now populated)
         emit_infos_scene(scene.name)             // EXPLICIT save -> freezes scenes/<name>.json
         setTimeout(populate_scene_list, 400)     // the archived scene appears in the list
    }

    // scene.remove() only detaches from the graph: the geometry, material and textures stay
    // in GPU memory, so dispose() them to free VRAM. The MAIN scene-switch crash, though, was a
    // V8 JS-heap OOM: every ball used to own a full THREE.Geometry (~1089 verts + ~2048 Face3 as
    // JS objects). Balls now SHARE one geometry (cf. shared_sphere_geometry), flagged _shared —
    // it must NOT be disposed here (other balls still reference it); only per-object geometries
    // (boxes, walls) are disposed.
    function dispose_object(o){
         if (!o){ return }
         scene.remove(o)
         if (o.geometry && o.geometry.dispose && !o.geometry._shared){ o.geometry.dispose() }
         var mats = o.material ? (o.material.length ? o.material : [o.material]) : []
         for (var m = 0; m < mats.length; m++){
               var mat = mats[m]; if (!mat){ continue }
               if (mat.map && mat.map.dispose){ mat.map.dispose() }         // texture (walls, boxes)
               if (mat.dispose){ mat.dispose() }
         }
    }
    function clear_scene_local(){
         // remove from the 3D graph all objects + springs + marks, and reset the lists
         for (var i in objects){ dispose_object(objects[i]) }
         for (var i in list_paired_harmonic){
               if (list_paired_harmonic[i][2]){ dispose_object(list_paired_harmonic[i][2]) }
         }
         for (var i in list_dotted_area){ dispose_object(list_dotted_area[i]) }
         objects = []
         list_moving_objects = []
         list_paired_harmonic = []
         list_string = []
         list_interact = []
         list_obj_inside = []
         list_dotted_area = []
         list_lids = []                              // lids (the meshes have already been removed via objects)
         listorig = {}; listmat = {};
         SELECTED = null; INTERSECTED = null; nearest_elem = null;
    }

    function clear_scene(){
         clear_scene_local()
         emit_infos_scene()                       // save the empty scene -> a refresh stays empty
    }

    $('#clear_scene').click(function(){
         bs_confirm('Clear scene', 'Clear the whole scene? (irreversible)', function(){ clear_scene() }, 'btn-danger', 'Clear')
    })

    function new_scene(){
         archive_scene($('#scene_name').val())    // 2nd role: archive the current scene (if it has a name)
         clear_scene_local()                      // then start over with a blank scene
         scene.name = ''
         $('#scene_name').val('')
         update_scene_name_display()
         selected_scene = null
         $('#scene_dropdown_label').html('choose&hellip;')
         emit_infos_scene()                       // pos.json = empty
    }

    $('#new_scene').click(function(){
         bs_confirm('New scene', 'The current scene will be saved if it has a name. Continue?', function(){ new_scene() })
    })

    $('#save_as_scene').click(function(){         // clone: saves the current scene under a new name
         bs_prompt('Save as', 'Scene name:', $('#scene_name').val(), function(name){ archive_scene(name) })
    })

    var selected_scene = null

    function carry_report_to(from, to, move){
         /*
         Makes the report of 'from' follow to 'to'. Waits for the pending edits to be
         written before copying. move = true: the source (scratch report of the unnamed
         scene) is consumed, so the next blank scene starts clean.
         */
         var flush = (typeof _report_dirty !== 'undefined' && _report_dirty && typeof report_save === 'function')
                     ? report_save(true) : $.Deferred().resolve()
         $.when(flush).always(function(){
               $.get('/report_copy/' + encodeURIComponent(from) + '?new=' + encodeURIComponent(to))
                .always(function(){
                      if (move){ $.get('/report_delete/' + encodeURIComponent(from)) }
                      if (typeof report_reload === 'function'){ report_reload() }
                      refresh_scene_descriptions()
                })
         })
    }

    // { scene : description !descr }. Comes from the server, so EVERY experiment gets its
    // tooltip — not only those whose report was written in this browser.
    var scene_descriptions = {}
    function refresh_scene_descriptions(done){
         $.ajax({ url: '/reports', dataType: 'json', cache: false })
          .done(function(d){ scene_descriptions = d || {} })
          .always(function(){ if (typeof done === 'function'){ done() } })
    }

    // ---- Virtual folder tree (Gmail-like) --------------------------------------
    // Scenes stay flat on disk; each carries a virtual path in its JSON ('_folder',
    // read server-side, cf. /scenes -> [{name, folder}]). Here we fold that flat list
    // into a collapsible tree. Expanded folders are remembered in localStorage.
    var _all_folders = []                         // existing folder paths (for the context menu)
    var _scene_expanded = null
    function _exp(){
         if (_scene_expanded){ return _scene_expanded }
         _scene_expanded = {}
         try { (JSON.parse(localStorage.getItem('scene_folders_expanded')) || []).forEach(function(p){ _scene_expanded[p] = true }) } catch(e){}
         return _scene_expanded
    }
    function _exp_save(){ try { localStorage.setItem('scene_folders_expanded', JSON.stringify(Object.keys(_exp()))) } catch(e){} }
    function _exp_toggle(p){ var s=_exp(); if (s[p]){ delete s[p] } else { s[p]=true } _exp_save() }
    function _esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
    function _cmp(a,b){ a=a.toLowerCase(); b=b.toLowerCase(); return a<b?-1:(a>b?1:0) }

    function _build_scene_tree(list){             // list = [{name, folder}] -> nested node
         var root = { path:'', folders:{}, scenes:[] }, fset = {}
         list.forEach(function(it){
               var folder = (it.folder || '').replace(/^\/+|\/+$/g,'')
               var node = root
               if (folder){
                     var parts = folder.split('/'), acc = ''
                     for (var i=0;i<parts.length;i++){
                           var seg = parts[i].trim(); if (!seg){ continue }
                           acc = acc ? acc+'/'+seg : seg; fset[acc] = true
                           if (!node.folders[seg]){ node.folders[seg] = { path:acc, folders:{}, scenes:[] } }
                           node = node.folders[seg]
                     }
               }
               node.scenes.push(it.name)
         })
         _all_folders = Object.keys(fset).sort(_cmp)
         return root
    }

    function _render_scene_node(node, depth, $ul){
         var exp = _exp()
         Object.keys(node.folders).sort(_cmp).forEach(function(fn){
               var f = node.folders[fn], open = !!exp[f.path]
               var subs = _all_folders.filter(function(p){ return p.indexOf(f.path+'/') === 0 })  // strict sub-folders
               var allOpen = subs.length && subs.every(function(p){ return !!exp[p] })
               var btn = subs.length ? '<span class="scene-folder-all" title="Ouvrir/fermer tous les sous-dossiers">'+(allOpen?'⊟':'⊞')+'</span>' : ''
               var $row = $('<li class="scene-folder">').attr('data-path', f.path)
                     .css('padding-left', (8 + depth*14) + 'px')
                     .html('<span class="tw">'+(open?'▾':'▸')+'</span> <span class="fname">'+_esc(fn)+'</span>'+btn)
               $ul.append($row)
               var $sub = $('<ul class="scene-subtree">').css('display', open?'block':'none')
               $ul.append($('<li class="scene-folder-body">').append($sub))
               _render_scene_node(f, depth+1, $sub)
         })
         node.scenes.sort(_cmp).forEach(function(nm){
               var $a = $('<a href="#" class="scene-link">').text(nm)
                     .attr('data-scene', nm).attr('data-folder', node.path)
                     .css('padding-left', (12 + depth*14) + 'px')
               var d = scene_descriptions[nm]; if (d){ $a.attr('title', d) }
               $ul.append($('<li>').append($a))
         })
    }

    function populate_scene_list(){
         refresh_scene_descriptions(function(){
               $.ajax({ url: '/scenes', dataType: 'json', cache: false }).done(function(list){
                     list = (list || []).map(function(x){ return (typeof x === 'string') ? {name:x, folder:''} : x })  // tolerate old shape
                     var menu = $('#scene_dropdown_menu').empty()
                     _render_scene_node(_build_scene_tree(list), 0, menu)
               })
         })
    }

    function _move_scene(name, folder){           // file a scene into a virtual folder (''=root)
         $.ajax({ url: '/scene_set_folder/' + encodeURIComponent(name), method: 'POST', data: { folder: folder } })
          .done(function(){ if (folder){ _exp()[folder] = true; _exp_save() }   // reveal the destination
                            populate_scene_list() })
          .fail(function(){ if (typeof bs_alert === 'function'){ bs_alert('Rangement', 'Le rangement a échoué.') } else { alert('Le rangement a échoué.') } })
    }

    function _rename_folder(path){                 // rename a folder = re-prefix every scene under it
         bs_prompt('Renommer le dossier', 'Nouveau nom :', path.split('/').pop(), function(nn){
               nn = (nn || '').trim().replace(/\//g,''); if (!nn){ return }
               var parent = path.indexOf('/') >= 0 ? path.slice(0, path.lastIndexOf('/')) : ''
               var newPath = parent ? parent+'/'+nn : nn
               $.ajax({ url:'/scenes', dataType:'json', cache:false }).done(function(list){
                     var jobs = []
                     list.forEach(function(it){
                           var f = it.folder || ''
                           if (f === path || f.indexOf(path+'/') === 0){
                                 var nf = newPath + f.slice(path.length)
                                 jobs.push($.ajax({ url:'/scene_set_folder/'+encodeURIComponent(it.name), method:'POST', data:{folder:nf} }))
                           }
                     })
                     $.when.apply($, jobs).always(function(){ _exp()[newPath]=true; _exp_save(); populate_scene_list() })
               })
         })
    }

    function scene_toast(text){                  // brief confirmation banner on a light-green background
         var el = document.getElementById('scene_toast')
         if (!el){
               el = document.createElement('div'); el.id = 'scene_toast'
               el.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:100000;'
                     + ' padding:12px 28px; border-radius:6px; font-family:sans-serif; font-size:16px; letter-spacing:normal;'
                     + ' background:#d6f5d6; color:#1b5e20; border:1px solid #9bd89b; box-shadow:0 2px 14px rgba(0,0,0,0.25);'
                     + ' opacity:0; transition:opacity 0.25s; pointer-events:none;'
               document.body.appendChild(el)
         }
         el.textContent = text
         el.style.opacity = '1'
         clearTimeout(el._hide); el._hide = setTimeout(function(){ el.style.opacity = '0' }, 1100)  // visible ~1.1 s then fades
    }

    function load_named_scene(name){             // loads a saved scene from the server
         $('.panel_scene').hide()                // close the Scene panel as soon as loading starts
         $.ajax({ url: '/scene/' + encodeURIComponent(name), dataType: 'json', cache: false })  // cache:false -> always the latest version
          .done(function(data){
               clear_scene_local()
               scene.name = name
               $('#scene_name').val(name)
               update_scene_name_display()
               load_scene(data)                   // recreates objects + chains
               scene.name = name                  // the FILENAME is authoritative: ignore a stale/corrupted internal scene_name (e.g. after a rename)
               $('#scene_name').val(name)
               update_scene_name_display()
               if (typeof history_seed === 'function'){ history_seed() }   // undo/redo: history specific to this scene
               scene_toast('loaded')              // brief "loaded" confirmation (light green)
          })
    }

    $('#scene_dropdown_menu').on('click', '.scene-link', function(e){    // selecting a scene in the dropdown
         e.preventDefault()
         selected_scene = $(this).attr('data-scene')
         $('#scene_dropdown_label').text(selected_scene)
    })

    $('#scene_dropdown_menu').on('dblclick', '.scene-link', function(e){ // double-click = load right away
         e.preventDefault(); e.stopPropagation()
         selected_scene = $(this).attr('data-scene'); $('#scene_dropdown_label').text(selected_scene)
         load_named_scene(selected_scene)
    })

    // Apply the current expand/collapse state to the existing tree DOM (no re-fetch):
    // arrows, sub-tree visibility, and the folder "open/close all" glyph (⊟/⊞).
    function _apply_expand_state(){
         var s = _exp()
         $('#scene_dropdown_menu .scene-folder').each(function(){
               var path = $(this).attr('data-path'), open = !!s[path]
               $(this).children('.tw').text(open ? '▾' : '▸')
               $(this).next('.scene-folder-body').children('.scene-subtree').css('display', open ? 'block' : 'none')
               var $btn = $(this).children('.scene-folder-all')
               if ($btn.length){
                     var subs = _all_folders.filter(function(p){ return p.indexOf(path+'/') === 0 })
                     $btn.text(subs.length && subs.every(function(p){ return !!s[p] }) ? '⊟' : '⊞')
               }
         })
    }

    // Folder header click = expand/collapse. stopPropagation so Bootstrap's document
    // handler doesn't close the whole dropdown (this menu closes on any outside click).
    $('#scene_dropdown_menu').on('click', '.scene-folder', function(e){
         e.preventDefault(); e.stopPropagation()
         _exp_toggle($(this).attr('data-path'))
         _apply_expand_state()
    })

    // "Open/close all sub-folders" button (across from the folder name).
    $('#scene_dropdown_menu').on('click', '.scene-folder-all', function(e){
         e.preventDefault(); e.stopPropagation()                 // don't also toggle the folder / close the menu
         var path = $(this).closest('.scene-folder').attr('data-path'), s = _exp()
         var subs = _all_folders.filter(function(p){ return p.indexOf(path+'/') === 0 })
         if (subs.length && subs.every(function(p){ return !!s[p] })){ subs.forEach(function(p){ delete s[p] }) }   // all open -> close them
         else { s[path] = true; subs.forEach(function(p){ s[p] = true }) }                                          // else -> open this + all sub-folders
         _exp_save()
         _apply_expand_state()
    })

    // ---- Custom right-click menu for the scene tree ----------------------------
    var $scene_ctx = null
    function _close_scene_ctx(){ if ($scene_ctx){ $scene_ctx.remove(); $scene_ctx = null } }
    $(document).on('click', _close_scene_ctx)
    $(document).on('keydown', function(e){ if (e.keyCode === 27){ _close_scene_ctx() } })

    function _ctx_open(cx, cy, build){
         _close_scene_ctx()
         $scene_ctx = $('<div class="scene-ctx">')
         build(function(label, fn, cls){
               $scene_ctx.append($('<div class="scene-ctx-item">').addClass(cls||'').text(label)
                     .on('click', function(e){ e.stopPropagation(); _close_scene_ctx(); fn() }))
         }, function(text, onDelete){                       // header = name (+ optional black × to delete)
               var $h = $('<div class="scene-ctx-head">').append($('<span class="scene-ctx-name">').text(text))
               if (onDelete){
                     $h.append($('<span class="scene-ctx-del" title="Supprimer la scène">✕</span>')
                           .on('click', function(e){ e.stopPropagation(); _close_scene_ctx(); onDelete() }))
               }
               $scene_ctx.append($h)
         }, function(){ $scene_ctx.append($('<div class="scene-ctx-sep">')) })
         $('body').append($scene_ctx)
         var w = $scene_ctx.outerWidth(), h = $scene_ctx.outerHeight()
         $scene_ctx.css({ left: Math.min(cx, window.innerWidth  - w - 4) + 'px',
                          top:  Math.min(cy, window.innerHeight - h - 4) + 'px' })
    }

    $('#scene_dropdown_menu').on('contextmenu', '.scene-link', function(e){
         e.preventDefault(); e.stopPropagation()
         var name = $(this).attr('data-scene'), cur = $(this).attr('data-folder') || ''
         _ctx_open(e.clientX, e.clientY, function(item, head, sep){
               head(name, function(){ _delete_scene(name) })     // black × across from the name
               _all_folders.forEach(function(fp){ if (fp !== cur){ item('→ ' + fp, function(){ _move_scene(name, fp) }) } })
               if (_all_folders.length){ sep() }
               item('Nouveau dossier / sous-dossier…', function(){
                     bs_prompt('Ranger', 'Chemin du dossier (ex: Thermo/atmo) :', cur, function(p){ _move_scene(name, (p||'').trim()) })
               })
               if (cur){ item('Sortir (racine)', function(){ _move_scene(name, '') }) }
         })
    })

    $('#scene_dropdown_menu').on('contextmenu', '.scene-folder', function(e){
         e.preventDefault(); e.stopPropagation()
         var path = $(this).attr('data-path')
         _ctx_open(e.clientX, e.clientY, function(item, head, sep){
               head('📁 ' + path)
               item('Renommer le dossier…', function(){ _rename_folder(path) })
               sep()
               item('Vider vers la racine', function(){   // move every scene under this folder back to root
                     $.ajax({ url:'/scenes', dataType:'json', cache:false }).done(function(list){
                           var jobs = []
                           list.forEach(function(it){ var f=it.folder||''; if (f===path || f.indexOf(path+'/')===0){ jobs.push($.ajax({ url:'/scene_set_folder/'+encodeURIComponent(it.name), method:'POST', data:{folder:''} })) } })
                           $.when.apply($, jobs).always(function(){ populate_scene_list() })
                     })
               }, 'scene-ctx-danger')
         })
    })

    $('#load_scene').click(function(){           // Load = reloads the selected scene (saved, frozen state)
         if (!selected_scene){ return }
         load_named_scene(selected_scene)
    })

    // Navbar reload arrow (↻): reload the CURRENT scene without opening the Scene panel.
    $('#reload_scene').click(function(){
         if (typeof scene !== 'undefined' && scene && scene.name){
               load_named_scene(scene.name)        // reload the saved state of the named scene (+ "loaded" toast)
         } else {                                  // unnamed working scene -> reload the current working state (pos.json)
               $.ajax({ url:'static/pos.json', dataType:'json', cache:false })
                .done(function(data){ clear_scene_local(); load_scene(data)
                      if (typeof scene_toast === 'function'){ scene_toast('loaded') } })
         }
    })

    $('#rename_scene').click(function(){          // renames the selected scene (server file)
         if (!selected_scene){ return }
         var old = selected_scene
         bs_prompt('Rename', 'New name for "' + old + '":', old, function(newname){
               newname = (newname || '').trim()
               if (!newname || newname === old){ return }
               $.ajax({ url: '/scene_rename/' + encodeURIComponent(old) + '?new=' + encodeURIComponent(newname), dataType: 'json' })
                .done(function(res){
                      if (!res || !res.ok){ return }
                      // migrate the undo/redo history (key = scene_history::<name>) so as not to lose it
                      try {
                            var hk = localStorage.getItem('scene_history::' + old)
                            if (hk !== null){ localStorage.setItem('scene_history::' + newname, hk); localStorage.removeItem('scene_history::' + old) }
                      } catch(e){}
                      // likewise rename the report file so it follows the renamed scene
                      $.get('/report_rename/' + encodeURIComponent(old) + '?new=' + encodeURIComponent(newname))
                       .always(function(){ refresh_scene_descriptions() })
                      // if we rename the CURRENTLY loaded scene, reflect the new name everywhere
                      if (scene.name === old){
                            scene.name = newname
                            $('#scene_name').val(newname)
                            update_scene_name_display()
                      }
                      selected_scene = newname
                      $('#scene_dropdown_label').text(newname)
                      populate_scene_list()          // refresh the dropdown list
                })
                .fail(function(xhr){
                      var msg = (xhr.responseJSON && xhr.responseJSON.error) || 'rename failed'
                      alert('Rename: ' + msg)         // e.g. « name already exists »
                })
         })
    })

    function _delete_scene(n){                     // delete a scene file (+ its report) then refresh
         bs_confirm('Remove', 'Remove scene "' + n + '"?', function(){
               $.getJSON('/scene_delete/' + encodeURIComponent(n), function(){
                     $.get('/report_delete/' + encodeURIComponent(n))    // its report goes with it
                      .always(function(){
                            if (selected_scene === n){ selected_scene = null; $('#scene_dropdown_label').html('choose&hellip;') }
                            refresh_scene_descriptions()
                            populate_scene_list()  // refresh the list
                      })
               })
         }, 'btn-danger', 'remove')
    }

    $('#delete_scene').click(function(){          // deletes the selected scene (server file)
         if (!selected_scene){ return }
         _delete_scene(selected_scene)
    })

    $('#quit_app').click(function(){              // stops the server and tries to close the tab
         bs_confirm('Quit', 'Stop the server and close the page?', function(){
               $.ajax({ url: '/shutdown', method: 'POST' }).always(function(){
                     document.body.innerHTML = '<h2 style="font-family:sans-serif; padding:40px; color:#555">Server stopped. You can close this tab.</h2>'
                     window.open('', '_self'); window.close();   // may be blocked by the browser for a normal tab
               })
         }, 'btn-danger', 'Quit')
    })

    populate_scene_list()                         // fills the list on load
    $('#scene').click(function(){                 // when opening the Scene menu: list + selection = current scene
         populate_scene_list()
         if (scene.name){
               selected_scene = scene.name
               $('#scene_dropdown_label').text(scene.name)
         }
    })

    // Cap the scenes dropdown so it never spills past the bottom of the Scene panel: with many
    // scenes the list used to run off-screen and the last ones were unreachable. NB: this
    // dropdown does NOT fire Bootstrap's shown.bs.dropdown (it's opened by a manual toggle of the
    // .open class, verified headless), so we watch the .open class directly and, once open, set
    // max-height = (panel bottom - list top). The inline overflow-y:auto scrolls the rest.
    ;(function(){
         var btn   = document.getElementById('scene_dropdown_btn')
         var dd    = btn ? btn.parentNode : null                 // the .dropdown container that gets .open
         var menu  = document.getElementById('scene_dropdown_menu')
         var panel = document.querySelector('.panel_scene')
         if (!dd || !menu || !panel){ return }
         function fit(){
               if (dd.className.indexOf('open') === -1){ return }  // only when the list is actually open
               var margin  = 10
               var menuTop = menu.getBoundingClientRect().top
               var avail   = Math.min(panel.getBoundingClientRect().bottom, window.innerHeight) - menuTop - margin
               menu.style.maxHeight = Math.max(avail, 80) + 'px'   // stay inside the panel AND the viewport; keep a few rows
         }
         new MutationObserver(fit).observe(dd, { attributes:true, attributeFilter:['class'] })
    })()

    </script>
