<!-- Scene -->

    <div class="panel_scene input_interface" hidden >

      <div class="titlepanel" > Scene </div>

          <br><br><br>

          <div style="margin-left:-20px">   <!-- partie du haut décalée de 20px vers la gauche -->
          <div  class="help" > <span style="font-size:0.75em"> Name: </span>
                  <input  value="" placeholder="nom" size=6 id="scene_name" style="font-size:0.75em">
                  <button id="save_as_scene" type="button" class="btn btn-default" data-toggle="tooltip" title="Save as">💾</button>
                  <button id="new_scene"     type="button" class="btn btn-primary"> New scene </button>
          </div> <br>
          <div  class="help" > <span style="font-size:0.75em"> Scenes : </span> </div>
          <div  class="help" >
                  <div class="dropdown" style="display:inline-block; text-align:left">
                    <button class="btn btn-default dropdown-toggle" type="button"
                            id="scene_dropdown_btn" data-toggle="dropdown"
                            aria-haspopup="true" aria-expanded="false">
                      <span id="scene_dropdown_label">choose&hellip;</span> <span class="caret"></span>
                    </button>
                    <ul class="dropdown-menu" id="scene_dropdown_menu" aria-labelledby="scene_dropdown_btn"></ul>
                  </div>
                  <button id="load_scene"   type="button" class="btn btn-warning" data-toggle="tooltip" title="Load">⤓</button>
                  <button id="delete_scene" type="button" class="btn btn-default" style="background:#ffc0cb" data-toggle="tooltip" title="Remove">❌</button>
          </div> <br>
          <center> <button id="clear_scene" type="button" class="btn btn-default" data-toggle="tooltip" title="clear the scene"> Clear </button> </center> <br>

          <hr>
          <div  class="help" > <span style="font-size:0.75em"> Scene parameters </span> </div>
          <div  class="help" id="scene_sky"    > <span style="font-size:0.6em"> Sky </span> </div><br>
          <div  class="help" id="scene_ground" > <span style="font-size:0.6em"> Ground </span> </div><br>
          <div  class="help" id="scene_light"  > <span style="font-size:0.6em"> Light </span> </div><br>
          <div  class="help" id="scene_fog"    > <span style="font-size:0.6em"> Fog </span> </div><br>
          </div>   <!-- fin du décalage : tout le contenu aligné à -20px -->

          <br>

    </div>

    <script>

    function update_scene_name_display(){         // nom de la scène affiché dans la navbar (à gauche du ?)
         $('#scene_name_navbar').text(scene.name || '')
    }

    function archive_scene(name){                 // enregistre la scène courante sous <name> (-> scenes/<name>.json)
         scene.name = (name || '').trim()
         $('#scene_name').val(scene.name)
         update_scene_name_display()
         emit_infos_scene(scene.name)             // sauvegarde EXPLICITE -> fige scenes/<name>.json
         setTimeout(populate_scene_list, 400)     // la scène archivée apparaît dans la liste
    }

    function clear_scene_local(){
         // retire du graphe 3D tous les objets + ressorts + marques, et réinitialise les listes
         for (var i in objects){ scene.remove(objects[i]) }
         for (var i in list_paired_harmonic){
               if (list_paired_harmonic[i][2]){ scene.remove(list_paired_harmonic[i][2]) }
         }
         for (var i in list_dotted_area){ scene.remove(list_dotted_area[i]) }
         objects = []
         list_moving_objects = []
         list_paired_harmonic = []
         list_string = []
         list_interact = []
         list_obj_inside = []
         list_dotted_area = []
         listorig = {}; listmat = {};
         SELECTED = null; INTERSECTED = null; nearest_elem = null;
    }

    function clear_scene(){
         clear_scene_local()
         emit_infos_scene()                       // sauvegarde la scène vide -> un rafraîchissement reste vide
    }

    $('#clear_scene').click(function(){
         bs_confirm('Clear scene', 'Clear the whole scene? (irreversible)', function(){ clear_scene() }, 'btn-danger', 'Clear')
    })

    function new_scene(){
         archive_scene($('#scene_name').val())    // 2e rôle : archive la scène courante (si elle porte un nom)
         clear_scene_local()                      // puis repart sur une scène vierge
         scene.name = ''
         $('#scene_name').val('')
         update_scene_name_display()
         selected_scene = null
         $('#scene_dropdown_label').html('choose&hellip;')
         emit_infos_scene()                       // pos.json = vide
    }

    $('#new_scene').click(function(){
         bs_confirm('New scene', 'The current scene will be saved if it has a name. Continue?', function(){ new_scene() })
    })

    $('#save_as_scene').click(function(){         // clone : enregistre la scène courante sous un nouveau nom
         bs_prompt('Save as', 'Scene name:', $('#scene_name').val(), function(name){ archive_scene(name) })
    })

    var selected_scene = null

    function populate_scene_list(){
         $.ajax({ url: '/scenes', dataType: 'json', cache: false }).done(function(names){
               var menu = $('#scene_dropdown_menu').empty()
               for (var i in names){
                     menu.append($('<li>').append(
                           $('<a href="#">').text(names[i]).attr('data-scene', names[i])
                     ))
               }
         })
    }

    function load_named_scene(name){             // charge une scène sauvegardée depuis le serveur
         $.ajax({ url: '/scene/' + encodeURIComponent(name), dataType: 'json', cache: false })  // cache:false -> toujours la dernière version
          .done(function(data){
               clear_scene_local()
               scene.name = name
               $('#scene_name').val(name)
               update_scene_name_display()
               load_scene(data)                   // recrée objets + chaînes
          })
    }

    $('#scene_dropdown_menu').on('click', 'a', function(e){    // sélection d'une scène dans le dropdown
         e.preventDefault()
         selected_scene = $(this).attr('data-scene')
         $('#scene_dropdown_label').text(selected_scene)
    })

    $('#load_scene').click(function(){           // Load = recharge la scène sélectionnée (état sauvegardé, figé)
         if (!selected_scene){ return }
         load_named_scene(selected_scene)
    })

    $('#delete_scene').click(function(){          // supprime la scène sélectionnée (fichier serveur)
         if (!selected_scene){ return }
         var n = selected_scene
         bs_confirm('Remove', 'Remove scene "' + n + '"?', function(){
               $.getJSON('/scene_delete/' + encodeURIComponent(n), function(){
                     selected_scene = null
                     $('#scene_dropdown_label').html('choose&hellip;')
                     populate_scene_list()        // rafraîchit la liste
               })
         }, 'btn-danger', 'remove')
    })

    $('#quit_app').click(function(){              // arrête le serveur et tente de fermer l'onglet
         bs_confirm('Quit', 'Stop the server and close the page?', function(){
               $.ajax({ url: '/shutdown', method: 'POST' }).always(function(){
                     document.body.innerHTML = '<h2 style="font-family:sans-serif; padding:40px; color:#555">Server stopped. You can close this tab.</h2>'
                     window.open('', '_self'); window.close();   // peut être bloqué par le navigateur pour un onglet normal
               })
         }, 'btn-danger', 'Quit')
    })

    populate_scene_list()                         // remplit la liste au chargement
    $('#scene').click(function(){                 // à l'ouverture du menu Scene : liste + sélection = scène actuelle
         populate_scene_list()
         if (scene.name){
               selected_scene = scene.name
               $('#scene_dropdown_label').text(scene.name)
         }
    })

    </script>
