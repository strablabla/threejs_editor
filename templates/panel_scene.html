<!-- Scene -->

    <div class="panel_scene input_interface" hidden >

      <div class="titlepanel" > Scene </div>

          <br><br><br>

          <div  class="help" > <span> Name: </span>
                  <input  value="" placeholder="nom" size=8 id="scene_name">
                  <button id="save_as_scene" type="button" class="btn btn-success btn-sm"> Save as </button>
                  <button id="new_scene"     type="button" class="btn btn-primary btn-sm"> New scene </button>
          </div> <br>
          <div  class="help" >
                  <div class="dropdown" style="display:inline-block; text-align:left; font-size:1.5em">
                    <button class="btn btn-default dropdown-toggle" type="button"
                            id="scene_dropdown_btn" data-toggle="dropdown"
                            aria-haspopup="true" aria-expanded="false">
                      <span id="scene_dropdown_label">choose&hellip;</span> <span class="caret"></span>
                    </button>
                    <ul class="dropdown-menu" id="scene_dropdown_menu" aria-labelledby="scene_dropdown_btn"></ul>
                  </div>
                  <button id="load_scene" type="button" class="btn btn-warning"> Load </button>
                  <button id="delete_scene" type="button" class="btn btn-danger btn-sm"> Supprimer </button>
          </div> <br>
          <div  class="help" id="scene_sky" > Sky </div><br>
          <div  class="help" id="scene_ground" > Ground </div><br>
          <div  class="help" id="scene_light" > Light </div><br>
          <div  class="help" id="scene_fog" > Fog </div><br>

          <center> <button id="clear_scene" type="button" class="btn btn-alert">
                    Clear
                   </button>
          </center>

          <br>

    </div>

    <script>

    function update_scene_name_display(){         // nom de la scène affiché dans la navbar (à gauche du ?)
         $('#scene_name_navbar').text(scene.name || '')
    }

    function archive_scene(name){                 // enregistre la scène courante sous <name> (-> scenes/<name>.json)
         scene.name = (name || '').trim()
         $('#scene_name').val(scene.name)
         update_scene_name_display()
         emit_infos_scene()
         setTimeout(populate_scene_list, 400)     // la scène archivée apparaît dans la liste
    }

    function clear_scene_local(){
         // retire du graphe 3D tous les objets + ressorts + marques, et réinitialise les listes
         for (var i in objects){ scene.remove(objects[i]) }
         for (var i in list_paired_harmonic){
               if (list_paired_harmonic[i][2]){ scene.remove(list_paired_harmonic[i][2]) }
         }
         for (var i in list_dotted_area){ scene.remove(list_dotted_area[i]) }
         objects = []
         list_moving_objects = []
         list_paired_harmonic = []
         list_string = []
         list_interact = []
         list_obj_inside = []
         list_dotted_area = []
         listorig = {}; listmat = {};
         SELECTED = null; INTERSECTED = null; nearest_elem = null;
    }

    function clear_scene(){
         clear_scene_local()
         emit_infos_scene()                       // sauvegarde la scène vide -> un rafraîchissement reste vide
    }

    $('#clear_scene').click(function(){
         if (confirm('Effacer toute la scène ? (irréversible)')){ clear_scene() }
    })

    function new_scene(){
         archive_scene($('#scene_name').val())    // 2e rôle : archive la scène courante (si elle porte un nom)
         clear_scene_local()                      // puis repart sur une scène vierge
         scene.name = ''
         $('#scene_name').val('')
         update_scene_name_display()
         selected_scene = null
         $('#scene_dropdown_label').html('choose&hellip;')
         emit_infos_scene()                       // pos.json = vide
    }

    $('#new_scene').click(function(){
         if (confirm('Nouvelle scène ? (la scène courante est archivée si elle porte un nom)')){ new_scene() }
    })

    $('#save_as_scene').click(function(){         // clone : enregistre la scène courante sous un nouveau nom
         var name = prompt('Enregistrer la scène sous quel nom ?', scene.name || '')
         if (name === null || !name.trim()){ return }
         archive_scene(name)
    })

    var selected_scene = null

    function populate_scene_list(){
         $.getJSON('/scenes', function(names){
               var menu = $('#scene_dropdown_menu').empty()
               for (var i in names){
                     menu.append($('<li>').append(
                           $('<a href="#">').text(names[i]).attr('data-scene', names[i])
                     ))
               }
         })
    }

    $('#scene_dropdown_menu').on('click', 'a', function(e){    // sélection d'une scène dans le dropdown
         e.preventDefault()
         selected_scene = $(this).attr('data-scene')
         $('#scene_dropdown_label').text(selected_scene)
    })

    $('#load_scene').click(function(){
         if (!selected_scene){ return }
         $.getJSON('/scene/' + encodeURIComponent(selected_scene), function(data){
               clear_scene_local()                // vide la scène courante (sans réécrire côté serveur)
               scene.name = selected_scene
               $('#scene_name').val(selected_scene)
               update_scene_name_display()
               load_scene(data)                   // recrée objets + chaînes
         })
    })

    $('#delete_scene').click(function(){          // supprime la scène sélectionnée (fichier serveur)
         if (!selected_scene){ return }
         if (!confirm('Supprimer la scène « ' + selected_scene + ' » ?')){ return }
         $.getJSON('/scene_delete/' + encodeURIComponent(selected_scene), function(){
               selected_scene = null
               $('#scene_dropdown_label').html('choose&hellip;')
               populate_scene_list()              // rafraîchit la liste
         })
    })

    populate_scene_list()                         // remplit la liste au chargement
    $('#scene').click(populate_scene_list)        // et à chaque ouverture du menu Scene

    </script>
