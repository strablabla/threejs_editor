<!-- Interaction : pilotage de la physique en direct -->

    <div class="panel_interaction input_interface" hidden >

      <div class="titlepanel" > Dynamics </div>

          <br><br>

          <!-- Onglets -->
          <div class="dyn_tabs">
            <button type="button" class="dyn_tab_btn active" data-tab="tab_interactions">Interactions</button>
            <button type="button" class="dyn_tab_btn" data-tab="tab_speeds">Initial speeds</button>
            <button type="button" class="dyn_tab_btn" data-tab="tab_monitoring">Monitoring</button>
          </div>

          <!-- ===== Page : Interactions ===== -->
          <div id="tab_interactions" class="dyn_tab">

            <!-- Sous-onglets : réglages physiques vs optimisations de calcul -->
            <div class="dyn_subtabs">
              <button type="button" class="dyn_subtab_btn active" data-subtab="sub_basic">Basic settings</button>
              <button type="button" class="dyn_subtab_btn" data-subtab="sub_optim">Optimisation</button>
            </div>

            <!-- ----- Sous-page : Basic settings ----- -->
            <div id="sub_basic" class="dyn_subtab">

              <div class="help">
                <label><input type="checkbox" id="chk_gravity"> Gravity (z)</label>
              </div><br>

              <div class="help">
                <label><input type="checkbox" id="chk_springs"> Springs (chains)</label>
              </div><br>

              <div class="help">
                <label><input type="checkbox" id="chk_attract"> Object interaction (1/r²)</label>
              </div><br>

              <div class="help indent_dyn">
                <label><input type="radio" name="attract_sign" id="rad_attract"> Attraction</label>
                &nbsp;
                <label><input type="radio" name="attract_sign" id="rad_repulse"> Repulsion</label>
              </div><br>

              <div class="help indent_dyn"> <span> Strength: </span>
                <input type="range" id="attract_strength_input" min="0" max="100000" step="1000" style="vertical-align:middle; width:120px">
                <input type="number" id="attract_strength_num" min="0" step="1000" style="width:90px" title="valeur libre (étend le curseur au-delà de son max)">
              </div><br>

              <div class="help indent_dyn"> <span> Softening ε: </span>
                <input type="range" id="softening_input" min="0" max="200" step="5" style="vertical-align:middle; width:120px">
                <span id="softening_val"></span>
              </div><br>

              <hr>
              <div class="help">
                <label><input type="checkbox" id="chk_deactivate_all"> deactivate the interactions</label>
              </div><br>

            </div>

            <!-- ----- Sous-page : Optimisation ----- -->
            <div id="sub_optim" class="dyn_subtab" style="display:none">

              <div class="help">
                <label><input type="checkbox" id="chk_cell_lists" title="collisions filtrées par grille spatiale : O(n) au lieu de O(n²), résultat identique"> Fast collisions (cell lists, O(n))</label>
              </div><br>

              <div class="help">
                <label><input type="checkbox" id="chk_barnes_hut" title="attraction 1/r² approchée par octree : O(n log n) au lieu de O(n²) — APPROXIMATION réglée par θ"> Fast attraction (Barnes-Hut, O(n log n))</label>
              </div><br>

              <div class="help indent_dyn"> <span> θ (precision): </span>
                <input type="range" id="bh_theta_input" min="0" max="1.5" step="0.05" style="vertical-align:middle; width:120px" title="0 = exact (lent) · plus grand = plus rapide mais plus approché">
                <span id="bh_theta_val"></span>
              </div><br>

            </div>

          </div>

          <!-- ===== Page : Initial speeds ===== -->
          <div id="tab_speeds" class="dyn_tab" style="display:none">

            <div class="help">
              <label><input type="checkbox" id="chk_random_speed"> Random</label>
            </div><br>

            <div class="help">
              <label><input type="checkbox" id="chk_random_speed_z"> z component</label>
            </div><br>

            <div class="help">
              <label><input type="checkbox" id="chk_show_speeds" title="affiche une flèche 3D de vitesse sur chaque objet mobile"> show speeds (3D arrows)</label>
            </div><br>

            <div class="help"> <span> Strength: </span>
              <input type="range" id="rng_speed_intensity" min="0" max="200" step="5" style="vertical-align:middle; width:120px">
              <span id="speed_intensity_val"></span>
            </div><br>

            <div class="help">
              <button type="button" id="btn_reinit_speeds" style="font-family:inherit; cursor:pointer; padding:3px 10px">reinitialize all</button>
              &nbsp;
              <button type="button" id="btn_flatten_z" style="font-family:inherit; cursor:pointer; padding:3px 10px" title="projette les boules sur z=0 (gaz plan)">flatten z=0</button>
            </div><br>

            <hr>
            <!-- Aperçu de la distribution des vitesses (module + dispersion angulaire) -->
            <div class="help" style="display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap">
              <div style="text-align:center">
                <div style="color:#888; margin-bottom:2px">|v| (count)</div>
                <canvas id="panel_speed_hist" width="180" height="120" style="background:#fafafa; border:1px solid #ddd"></canvas>
              </div>
              <div style="text-align:center">
                <div style="color:#888; margin-bottom:2px">angular (x-y)</div>
                <canvas id="panel_angle_hist" width="130" height="130" style="background:#fafafa; border:1px solid #ddd"></canvas>
              </div>
            </div><br>

          </div>

          <!-- ===== Page : Monitoring ===== -->
          <div id="tab_monitoring" class="dyn_tab" style="display:none">

            <div class="help">
              <label><input type="checkbox" id="chk_energy_graph"> energy graph</label>
            </div><br>

            <div class="help">
              <label><input type="checkbox" id="chk_velocity_hist"> velocity histogram</label>
            </div><br>

            <div class="help">
              <label><input type="checkbox" id="chk_trajectories"> trajectories</label>
            </div><br>

            <div class="help">
              <label><input type="checkbox" id="chk_altitude_hist"> altitude histogram</label>
            </div><br>

          </div>

    </div>

    <script>

    // --- Initialise les contrôles à partir des variables globales (scene_params.js) ---
    $('#chk_gravity').prop('checked', gravity_ok)
    $('#chk_springs').prop('checked', springs_ok)
    $('#chk_attract').prop('checked', one_over_r2)
    $('#rad_attract').prop('checked', attract_strength_one_over_r2 >= 0)
    $('#rad_repulse').prop('checked', attract_strength_one_over_r2 < 0)
    // Applique une intensité (module) : synchronise curseur + champ, étend le max du curseur si dépassé
    function apply_strength(mag){
        mag = Math.abs(mag); if (isNaN(mag)){ mag = 0 }
        var $sl = $('#attract_strength_input')
        if (mag > parseFloat($sl.attr('max'))){ $sl.attr('max', mag) }   // le curseur peut aller au-delà de 100000
        $sl.val(mag)
        $('#attract_strength_num').val(mag)
        var sign = $('#rad_repulse').is(':checked') ? -1 : 1             // répulsion = signe négatif
        attract_strength_one_over_r2 = sign * mag
    }
    apply_strength(Math.abs(attract_strength_one_over_r2))

    // La case "deactivate" est cochée quand AUCUNE interaction n'est active
    function sync_deactivate_all(){
        $('#chk_deactivate_all').prop('checked', !gravity_ok && !springs_ok && !one_over_r2)
    }
    sync_deactivate_all()

    // --- Câblage : chaque contrôle écrit dans le drapeau physique correspondant ---
    $('#chk_gravity').change(function(){ gravity_ok = this.checked; sync_deactivate_all() })
    $('#chk_springs').change(function(){ springs_ok = this.checked; sync_deactivate_all() })
    $('#chk_attract').change(function(){ one_over_r2 = this.checked; sync_deactivate_all() })

    // Case maîtresse : cochée = désactive TOUTES les interactions ; décochée = les réactive
    $('#chk_deactivate_all').change(function(){
        var on = !this.checked
        gravity_ok = on; springs_ok = on; one_over_r2 = on
        $('#chk_gravity').prop('checked', on)
        $('#chk_springs').prop('checked', on)
        $('#chk_attract').prop('checked', on)
    })

    // Collisions accélérées (grille spatiale O(n)) : bascule exact <-> optimisé
    $('#chk_cell_lists').prop('checked', use_cell_lists)
    $('#chk_cell_lists').change(function(){ use_cell_lists = this.checked })

    // Attraction accélérée (Barnes-Hut O(n log n)) + précision θ
    $('#chk_barnes_hut').prop('checked', use_barnes_hut)
    $('#chk_barnes_hut').change(function(){ use_barnes_hut = this.checked })
    $('#bh_theta_input').val(barnes_hut_theta)
    $('#bh_theta_val').text(barnes_hut_theta)
    $('#bh_theta_input').on('input change', function(){
        barnes_hut_theta = parseFloat(this.value)
        $('#bh_theta_val').text(barnes_hut_theta)
    })

    $('#rad_attract').change(function(){ apply_strength(Math.abs(attract_strength_one_over_r2)) })  // recalcule le signe
    $('#rad_repulse').change(function(){ apply_strength(Math.abs(attract_strength_one_over_r2)) })
    $('#attract_strength_input').on('input change', function(){ apply_strength(this.value) })       // curseur
    $('#attract_strength_num').on('input change', function(){ apply_strength(this.value) })          // saisie libre
    $('#attract_strength_num').on('keydown keypress keyup mousedown mousemove mouseup dblclick', function(e){ e.stopPropagation() })

    // --- Softening ε de la gravité (F = G·m·m/(r²+ε²)) : ε=0 -> 1/r² pur ---
    $('#softening_input').val(attract_softening)
    $('#softening_val').text(attract_softening)
    $('#softening_input').on('input change', function(){
        attract_softening = parseFloat(this.value)
        $('#softening_val').text(attract_softening)
    })

    // --- Vitesse de départ des boules : mode aléatoire/zéro + intensité ---
    $('#chk_random_speed').prop('checked', random_initial_speed)
    $('#chk_random_speed_z').prop('checked', random_speed_z)
    $('#rng_speed_intensity').val(random_speed_module)
    $('#speed_intensity_val').text(random_speed_module)
    $('#chk_random_speed').change(function(){ random_initial_speed = this.checked })
    $('#chk_random_speed_z').change(function(){ random_speed_z = this.checked })
    $('#rng_speed_intensity').on('input change', function(){
        random_speed_module = parseFloat(this.value)
        $('#speed_intensity_val').text(random_speed_module)
    })

    // Flèches 3D de vitesse : la boucle render() les crée/actualise ; décoché -> nettoyage immédiat
    $('#chk_show_speeds').prop('checked', show_speeds)
    $('#chk_show_speeds').change(function(){
        show_speeds = this.checked
        if (!show_speeds && typeof clear_speed_arrows === 'function'){ clear_speed_arrows() }
    })

    // Rafraîchit TOUS les contrôles du panneau depuis les variables globales
    // (appelé au chargement d'une scène qui restaure les réglages Dynamics).
    window.refresh_dynamics_panel = function(){
        $('#chk_gravity').prop('checked', gravity_ok)
        $('#chk_springs').prop('checked', springs_ok)
        $('#chk_attract').prop('checked', one_over_r2)
        $('#rad_attract').prop('checked', attract_strength_one_over_r2 >= 0)
        $('#rad_repulse').prop('checked', attract_strength_one_over_r2 < 0)
        apply_strength(Math.abs(attract_strength_one_over_r2))
        $('#chk_cell_lists').prop('checked', use_cell_lists)
        $('#chk_barnes_hut').prop('checked', use_barnes_hut)
        $('#bh_theta_input').val(barnes_hut_theta)
        $('#bh_theta_val').text(barnes_hut_theta)
        $('#softening_input').val(attract_softening)
        $('#softening_val').text(attract_softening)
        $('#chk_random_speed').prop('checked', random_initial_speed)
        $('#chk_random_speed_z').prop('checked', random_speed_z)
        $('#rng_speed_intensity').val(random_speed_module)
        $('#speed_intensity_val').text(random_speed_module)
        $('#chk_show_speeds').prop('checked', show_speeds).trigger('change')
        sync_deactivate_all()
        // Monitoring : régler la case ET déclencher son handler (affiche/masque la fenêtre)
        if (typeof altitude_fit_expr !== 'undefined'){ $('#altitude_fit_expr').val(altitude_fit_expr || '') }
        $('#chk_energy_graph').prop('checked', show_energy_graph).trigger('change')
        $('#chk_velocity_hist').prop('checked', show_velocity_hist).trigger('change')
        $('#chk_altitude_hist').prop('checked', show_altitude_hist).trigger('change')
        if (typeof highlight_traj_mode === 'function'){ highlight_traj_mode() }
        if (typeof highlight_z_means === 'function'){ highlight_z_means() }
        $('#chk_trajectories').prop('checked', show_trajectories).trigger('change')
    }

    // Redessine les aperçus |v| + rose angulaire de l'onglet Initial speeds (mise à jour "sur action")
    function refresh_speed_panels(){
        if (typeof draw_speed_panels === 'function'){ draw_speed_panels() }
    }

    // Réinitialise la vitesse de TOUTES les boules selon les params courants (relance une simu de zéro)
    $('#btn_reinit_speeds').on('click', function(){
        reinitialize_speeds()
        if (typeof draw_velocity_hist === 'function'){ draw_velocity_hist() }   // rafraîchit l'histogramme si affiché
        refresh_speed_panels()
    })
    $('#btn_flatten_z').on('click', function(){                 // aplatit les boules sur z=0 (nettoie la dérive z)
        flatten_z()
        if (typeof emit_infos_scene === 'function'){ emit_infos_scene() }   // persiste les positions aplaties
        refresh_speed_panels()
    })

    // --- Monitoring : graphe d'énergie ---
    $('#chk_energy_graph').prop('checked', show_energy_graph)
    $('#chk_energy_graph').change(function(){
        show_energy_graph = this.checked
        if (show_energy_graph){
              energy_hist = { tot: [], kin: [], pot: [] }   // repart d'un historique vierge
              $('#energy_graph_box').show()
        } else {
              $('#energy_graph_box').hide()
        }
    })

    // --- Monitoring : histogramme des vitesses ---
    $('#chk_velocity_hist').prop('checked', show_velocity_hist)
    $('#chk_velocity_hist').change(function(){
        show_velocity_hist = this.checked
        if (show_velocity_hist){
              $('#velocity_hist_box').show()
              draw_velocity_hist()                          // dessin immédiat (sans attendre l'animation)
        } else {
              $('#velocity_hist_box').hide()
        }
    })

    // --- Monitoring : trajectoires + MSD ---
    $('#chk_trajectories').prop('checked', show_trajectories)
    $('#chk_trajectories').change(function(){
        show_trajectories = this.checked
        if (show_trajectories){
              reset_all_trajectories()                      // repart d'un tracé vierge
              $('#trajectories_box').show()
              if (typeof apply_traj_mode === 'function'){ apply_traj_mode() }
              draw_trajectories()
        } else {
              $('#trajectories_box').hide()
        }
    })
    // Tracés affichés : bascules indépendantes x–y / z(t) / MSD (toutes combinaisons ; boutons -> pas de focus/typeahead comme un <select>)
    if (typeof traj_show === 'undefined'){ traj_show = { xy:true, z:false, msd:true } }  // garde-fou (JS servi depuis le cache)
    window.highlight_traj_mode = function(){                    // surligne chaque bouton actif
        $('.traj_mode_btn').each(function(){
            var on = !!traj_show[this.getAttribute('data-mode')]
            $(this).css({'font-weight': on ? 'bold' : 'normal', 'background': on ? '#cfe3ff' : ''})
        })
    }
    $('.traj_mode_btn').on('click', function(){
        var m = this.getAttribute('data-mode')
        traj_show[m] = !traj_show[m]                           // bascule ce tracé indépendamment des autres
        this.blur()                                            // rend le focus clavier à la scène (le raccourci 'x' reste fonctionnel)
        highlight_traj_mode()
        if (typeof apply_traj_mode === 'function'){ apply_traj_mode() }
        if (typeof draw_trajectories === 'function'){ draw_trajectories() }
    })
    highlight_traj_mode()
    // z(t) : n'afficher que les moyennes ⟨z⟩ (masque les courbes)
    if (typeof z_means_only === 'undefined'){ z_means_only = false }
    window.highlight_z_means = function(){
        $('#btn_z_means').css({'font-weight': z_means_only ? 'bold' : 'normal', 'background': z_means_only ? '#cfe3ff' : ''})
    }
    $('#btn_z_means').on('click', function(){
        z_means_only = !z_means_only
        this.blur()
        highlight_z_means()
        if (typeof draw_trajectories === 'function'){ draw_trajectories() }
    })
    highlight_z_means()
    $('#btn_reset_traj').on('click', function(){            // réinitialise toutes les trajectoires (origine = position courante)
        reset_all_trajectories()
        draw_trajectories()
    })

    // --- Monitoring : histogramme d'altitude (N vs z) ---
    $('#chk_altitude_hist').prop('checked', show_altitude_hist)
    $('#chk_altitude_hist').change(function(){
        show_altitude_hist = this.checked
        if (show_altitude_hist){
              $('#altitude_hist_box').show()
              draw_altitude_hist()                            // dessin immédiat (fixe la plage z)
              if (typeof altitude_fit_expr !== 'undefined' && altitude_fit_expr){
                    request_altitude_fit(altitude_fit_expr)   // ré-évalue l'ajustement sauvegardé sur la plage courante
              }
        } else {
              $('#altitude_hist_box').hide()
        }
    })
    // Filtre de couleur : ne compter que les objets d'une couleur (« all » = tous).
    // Les options sont (re)peuplées par refresh_alt_color_options() depuis draw_altitude_hist.
    $('#alt_color_sel').on('change', function(){
        alt_color_filter = this.value
        this.blur()                                        // un <select> gardé au focus capte les raccourcis de scène (typeahead : « x »…)
        if (typeof draw_altitude_hist === 'function'){ draw_altitude_hist() }   // dessin immédiat, sans attendre l'animation
    })
    // INDISPENSABLE pour que la liste déroulante s'ouvre : TrackballControls est construit sans domElement
    // (init_scene.js) -> il s'attache à DOCUMENT et fait preventDefault() sur CHAQUE mousedown de la page.
    // Or ouvrir un <select> est justement l'action par défaut du mousedown : sans ce stopPropagation,
    // l'événement remonte jusqu'à lui et le menu ne s'ouvre jamais. Même parade que le champ « fit ».
    $('#alt_color_sel').on('keydown keypress keyup mousedown mousemove mouseup dblclick', function(e){ e.stopPropagation() })

    // Ajustement Python de N(z) : bouton "fit" ou Entrée dans le champ
    // Après validation, on DÉFOCALISE le champ -> le clavier repart à la scène.
    $('#altitude_fit_btn').on('click', function(){
        if (typeof request_altitude_fit === 'function'){ request_altitude_fit($('#altitude_fit_expr').val()) }
        $('#altitude_fit_expr').blur()
        if (renderer && renderer.domElement && renderer.domElement.focus){ renderer.domElement.focus() }
    })
    $('#altitude_fit_expr').on('keydown', function(e){
        if ((e.which === 13 || e.which === 27) && typeof request_altitude_fit === 'function'){   // Entrée ou Échap
              if (e.which === 13){ request_altitude_fit(this.value) }
              this.blur()
              e.preventDefault()
        }
    })
    // Ne pas laisser les touches/clics du champ déclencher les raccourcis de scène TANT qu'il a le focus
    $('#altitude_fit_expr').on('keydown keypress keyup mousedown mousemove mouseup dblclick', function(e){ e.stopPropagation() })

    // Croix de fermeture des fenêtres de suivi : décoche la case Monitoring correspondante
    // et déclenche son handler 'change' (masque la fenêtre + met à jour le drapeau global).
    $(document).on('click', '.mon_close', function(){
        $('#' + $(this).data('chk')).prop('checked', false).trigger('change')
    })

    // Onglets (générique, pour TOUS les panneaux à onglets : Dynamics, Tools…)
    // Délégué + scopé au panneau courant pour ne pas interférer entre panneaux.
    $(document).on('click', '.dyn_tab_btn', function(){
        var $panel = $(this).closest('.input_interface')
        $panel.find('.dyn_tab_btn').removeClass('active')
        $(this).addClass('active')
        $panel.find('.dyn_tab').hide()
        $panel.find('#' + $(this).data('tab')).show()
        if ($(this).data('tab') === 'tab_speeds'){ refresh_speed_panels() }   // aperçus à jour à l'ouverture
    })

    // Sous-onglets (Basic settings / Optimisation dans Interactions).
    // Scopé au .dyn_tab parent pour ne pas toucher aux onglets de niveau supérieur.
    $(document).on('click', '.dyn_subtab_btn', function(){
        var $group = $(this).closest('.dyn_tab')
        $group.find('.dyn_subtab_btn').removeClass('active')
        $(this).addClass('active')
        $group.find('.dyn_subtab').hide()
        $group.find('#' + $(this).data('subtab')).show()
    })

    // Ne pas faire pivoter la caméra quand on manipule le panneau
    $('.panel_interaction').hover(
        function(){ controls.enabled = false },
        function(){ controls.enabled = true }
    )

    </script>
